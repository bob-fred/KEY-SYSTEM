<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>BloxAccShop</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background: radial-gradient(circle at top, #1e293b, #0f172a);
  color:white;
  font-family: 'Inter', sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background: rgba(30, 41, 59, 0.9);
  padding:40px;
  border-radius:18px;
  width:360px;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
  text-align:center;
}

h1{
  font-size:22px;
  margin-bottom:20px;
}

input, select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  outline:none;
  background:#0f172a;
  color:white;
}

input::placeholder{
  color:#94a3b8;
}

button{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#22c55e,#16a34a);
  color:white;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:scale(1.03);
}

.small{
  font-size:12px;
  color:#94a3b8;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="card">

<h1>🛒 BloxAccShop</h1>

<input id="pseudo" placeholder="Pseudo Roblox">
<input id="discord" placeholder="@Discord">

<select id="product">
  <option value="MAX">⚡ Max Level</option>
  <option value="SEA3">🌊 Sea 3</option>
  <option value="SEA2">🌴 Sea 2</option>
</select>

<button onclick="buy()">Acheter maintenant</button>

<div class="small">
Paiement sécurisé via PayPal
</div>

</div>

<script>

function generateID(){
  return Math.random().toString(36).substring(2,10);
}

async function buy(){

  let pseudo = document.getElementById("pseudo").value;
  let discord = document.getElementById("discord").value;
  let product = document.getElementById("product").value;

  if(!pseudo || !discord){
    alert("Remplis tout !");
    return;
  }

  let orderID = generateID();

  await fetch("https://TON-SITE.onrender.com/create-order", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      orderID,
      pseudo,
      discord,
      product
    })
  });

  if(product === "MAX"){
    window.location.href = "https://www.paypal.com/ncp/payment/QDADATH3NGWX6";
  }

  if(product === "SEA3"){
    window.location.href = "https://www.paypal.com/ncp/payment/ZUU5HWRATPP3N";
  }

  if(product === "SEA2"){
    window.location.href = "https://www.paypal.com/ncp/payment/DWETJYAZXVW5E";
  }

}

</script>

</body>
</html>
