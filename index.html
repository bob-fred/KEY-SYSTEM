<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>BloxAccShop</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#1e293b;
  padding:40px;
  border-radius:15px;
  width:350px;
  text-align:center;
}

input, select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  background:#0f172a;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#16a34a;
}

.label{
  font-size:12px;
  color:#94a3b8;
  margin-top:4px;
  margin-bottom:2px;
  text-align:left;
}
</style>
</head>

<body>

<div class="card">

<h2>🛒 BloxAccShop</h2>

<!-- TON PSEUDO -->
<div class="label">Ton pseudo</div>
<input id="pseudo" placeholder="Ex: Player123">

<!-- PSEUDO COMPTE ACHAT -->
<div class="label">Met le pseudo du compte que tu veux acheter</div>
<input id="discord" placeholder="Ex: Account123">

<select id="product">
  <option value="MAX">Max Level</option>
  <option value="SEA3">Sea 3</option>
  <option value="SEA2">Sea 2</option>
</select>

<button onclick="buy()">Acheter</button>

</div>

<script>

function generateID(){
  return Math.random().toString(36).substring(2,10);
}

async function buy(){

  let pseudo = document.getElementById("pseudo").value;
  let account = document.getElementById("discord").value;
  let product = document.getElementById("product").value;

  if(!pseudo || !account){
    alert("Remplis tout !");
    return;
  }

  let orderID = generateID();

  fetch("https://key-system-3ny0.onrender.com/create-order", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      orderID,
      pseudo,
      account,
      product
    })
  }).catch(()=>{});

  if(product === "MAX"){
    window.location.href = "https://www.paypal.com/ncp/payment/QDADATH3NGWX6";
  }

  if(product === "SEA3"){
    window.location.href = "https://www.paypal.com/ncp/payment/ZUU5HWRATPP3N";
  }

  if(product === "SEA2"){
    window.location.href = "https://www.paypal.com/ncp/payment/DWETJYAZXVW5E";
  }

}

</script>

</body>
</html>
